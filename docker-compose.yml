services:

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: api
    container_name: hospilink-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - SERVICE=api
      - ENABLE_CRON_JOBS=true
    networks:
      - hospilink-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    stop_grace_period: 30s

  agent:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: agent
    container_name: hospilink-agent
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - SERVICE=agent
      - AGENT_PORT=3002
    networks:
      - hospilink-network
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3002/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    stop_grace_period: 30s

networks:
  hospilink-network:
    driver: bridge
