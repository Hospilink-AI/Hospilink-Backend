services:

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: hospilink-backend:latest
    container_name: hospilink-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - ENABLE_CRON_JOBS=true
    networks:
      - hospilink-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    stop_grace_period: 30s

  agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    image: hospilink-agent:latest
    container_name: hospilink-agent
    restart: unless-stopped
    ports:
      - "3002:3002"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - AGENT_PORT=3002
    networks:
      - hospilink-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:3002/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    stop_grace_period: 30s

networks:
  hospilink-network:
    driver: bridge